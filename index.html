<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#07010f" />
  <title>给懒羊羊的一封信</title>

  <style>
    :root {
      --pink: #ff4fa3;
      --soft-pink: #ffd9eb;
      --purple: #8c63ff;
      --deep: #07010f;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--deep);
      color: #fff;
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      touch-action: manipulation;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 16%, rgba(140, 99, 255, 0.35), transparent 32%),
        radial-gradient(circle at 82% 78%, rgba(255, 79, 163, 0.32), transparent 34%),
        radial-gradient(circle at 50% 50%, rgba(255, 220, 239, 0.10), transparent 42%),
        linear-gradient(135deg, #05000b 0%, #150320 52%, #040008 100%);
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .scene {
      position: absolute;
      inset: 0;
      transition: opacity 0.75s ease, transform 0.75s ease, filter 0.75s ease;
    }

    .scene-one {
      z-index: 8;
      display: grid;
      place-items: center;
      padding: 22px;
    }

    .scene-one.hide {
      opacity: 0;
      transform: scale(1.06);
      filter: blur(8px);
      pointer-events: none;
    }

    .scene-two {
      z-index: 3;
      opacity: 0;
      transform: scale(0.98);
      pointer-events: none;
    }

    .scene-two.show {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .card {
      position: relative;
      width: min(90vw, 520px);
      padding: clamp(30px, 7vw, 44px) clamp(22px, 6vw, 36px);
      border-radius: 30px;
      text-align: center;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.055)),
        radial-gradient(circle at 50% 0%, rgba(255,79,163,.24), transparent 62%);
      border: 1px solid rgba(255,255,255,.20);
      box-shadow: 0 22px 70px rgba(0,0,0,.48), 0 0 44px rgba(255,79,163,.20);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -45%;
      background: conic-gradient(from 0deg, transparent, rgba(255,255,255,.18), transparent, rgba(255,79,163,.18), transparent);
      animation: turn 8s linear infinite;
      opacity: .85;
    }

    .card-inner {
      position: relative;
      z-index: 1;
    }

    .seal {
      position: relative;
      width: clamp(90px, 26vw, 120px);
      height: clamp(90px, 26vw, 120px);
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: radial-gradient(circle, #fff 0%, #ffd6e8 35%, rgba(255,79,163,.35) 60%, transparent 74%);
      box-shadow: 0 0 34px rgba(255,79,163,.72);
    }

    .seal::before,
    .seal::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255,218,236,.58);
    }

    .seal::before {
      inset: -10px;
      animation: turn 7s linear infinite;
    }

    .seal::after {
      inset: -20px;
      border-style: dashed;
      opacity: .68;
      animation: turn 11s linear infinite reverse;
    }

    .heart-icon {
      position: relative;
      width: clamp(38px, 11vw, 52px);
      height: clamp(38px, 11vw, 52px);
      background: var(--pink);
      transform: rotate(45deg);
      animation: beat 1.25s ease-in-out infinite;
      box-shadow: 0 0 20px rgba(255,79,163,.82);
    }

    .heart-icon::before,
    .heart-icon::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: inherit;
      border-radius: 50%;
    }

    .heart-icon::before {
      left: -50%;
      top: 0;
    }

    .heart-icon::after {
      left: 0;
      top: -50%;
    }

    .label {
      margin: 0 0 12px;
      font-size: 13px;
      letter-spacing: .22em;
      color: rgba(255,236,246,.78);
    }

    .open-title,
    .main-title {
      margin: 0;
      font-weight: 900;
      letter-spacing: .08em;
      line-height: 1.08;
      color: transparent;
      background: linear-gradient(90deg, #fff, #ffd7e9, #ff5da9, #fff);
      background-size: 230% auto;
      -webkit-background-clip: text;
      background-clip: text;
      animation: shine 3.4s linear infinite;
    }

    .open-title {
      font-size: clamp(34px, 10vw, 62px);
    }

    .open-text {
      margin: 20px auto 0;
      line-height: 1.75;
      font-size: clamp(15px, 4vw, 20px);
      color: rgba(255,238,247,.92);
    }

    .open-btn {
      position: relative;
      margin-top: 28px;
      min-width: 172px;
      padding: 15px 28px;
      border: 0;
      border-radius: 999px;
      color: #fff;
      font-size: clamp(15px, 4vw, 17px);
      letter-spacing: .08em;
      background: linear-gradient(135deg, #ff4fa3, #8c63ff, #ff86c2);
      background-size: 220% auto;
      box-shadow: 0 12px 30px rgba(255,79,163,.35);
      cursor: pointer;
      animation: btn 2.4s ease-in-out infinite;
    }

    .tip {
      margin-top: 15px;
      font-size: 13px;
      color: rgba(255,255,255,.58);
    }

    /* 第二幕：中心悬浮旋转爱心 */
    .heart-stage {
      position: absolute;
      left: 50%;
      top: 34%;
      z-index: 4;
      width: min(54vw, 260px);
      height: min(54vw, 260px);
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      pointer-events: none;
      perspective: 900px;
    }

    .heart-aura {
      position: absolute;
      width: 118%;
      height: 118%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,79,163,.34), rgba(255,79,163,.12) 38%, transparent 70%);
      filter: blur(10px);
      animation: auraPulse 2.6s ease-in-out infinite;
    }

    .heart-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 118%;
      height: 48%;
      border-radius: 50%;
      border: 1px solid rgba(255, 214, 235, .45);
      transform: translate(-50%, -50%) rotate(-18deg);
      box-shadow: 0 0 18px rgba(255,79,163,.22);
      animation: ringSpin 5.5s linear infinite;
    }

    .heart-ring.r2 {
      width: 138%;
      height: 58%;
      border-style: dashed;
      border-color: rgba(140, 99, 255, .42);
      animation-duration: 8s;
      animation-direction: reverse;
    }

    .heart-ring.r3 {
      width: 94%;
      height: 40%;
      border-color: rgba(255, 255, 255, .30);
      animation-duration: 4.4s;
    }

    .big-heart-box {
      position: relative;
      width: 42%;
      height: 42%;
      transform-style: preserve-3d;
      animation: floatSpin 4.8s ease-in-out infinite;
    }

    .big-heart {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 28% 28%, rgba(255,255,255,.92), rgba(255,173,211,.82) 18%, rgba(255,79,163,1) 52%, rgba(190,28,116,1) 100%);
      transform: rotate(45deg);
      border-radius: 16%;
      box-shadow:
        0 0 18px rgba(255,255,255,.72),
        0 0 34px rgba(255,79,163,.80),
        0 0 70px rgba(255,79,163,.46);
    }

    .big-heart::before,
    .big-heart::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: inherit;
      border-radius: 50%;
      box-shadow: inherit;
    }

    .big-heart::before {
      left: -50%;
      top: 0;
    }

    .big-heart::after {
      left: 0;
      top: -50%;
    }

    .heart-shine {
      position: absolute;
      left: 12%;
      top: 8%;
      width: 35%;
      height: 18%;
      border-radius: 50%;
      background: rgba(255,255,255,.72);
      filter: blur(3px);
      transform: rotate(-18deg);
      z-index: 2;
    }

    .letter-wrap {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 18px 18px max(54px, env(safe-area-inset-bottom));
      pointer-events: none;
    }

    .letter {
      width: min(92vw, 760px);
      min-height: min(42vh, 330px);
      padding: clamp(24px, 6vw, 42px) clamp(22px, 6vw, 50px);
      border-radius: clamp(26px, 7vw, 36px);
      text-align: center;
      background: rgba(255,255,255,.070);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 22px 70px rgba(0,0,0,.34), 0 0 50px rgba(255,79,163,.14);
    }

    .main-title {
      font-size: clamp(32px, 9vw, 66px);
      margin-bottom: 14px;
    }

    .poem {
      min-height: 150px;
      margin: 0 auto;
      max-width: 680px;
      white-space: pre-wrap;
      font-size: clamp(19px, 4.9vw, 31px);
      line-height: 1.58;
      font-weight: 600;
      color: #fff1f7;
      text-shadow: 0 0 16px rgba(255,79,163,.72);
    }

    .signature {
      margin-top: 16px;
      font-size: clamp(12px, 3vw, 17px);
      letter-spacing: .08em;
      color: rgba(255,221,237,.80);
      opacity: 0;
      transform: translateY(10px);
      transition: .7s ease;
    }

    .signature.show {
      opacity: 1;
      transform: translateY(0);
    }

    .tap-hint {
      position: absolute;
      left: 50%;
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 7;
      transform: translateX(-50%);
      width: max-content;
      max-width: 86vw;
      text-align: center;
      font-size: 13px;
      letter-spacing: .06em;
      color: rgba(255,255,255,.62);
      opacity: 0;
      transition: .7s ease 1.2s;
      pointer-events: none;
    }

    .tap-hint.show {
      opacity: 1;
    }

    @keyframes turn {
      to { transform: rotate(360deg); }
    }

    @keyframes beat {
      0%, 100% { transform: rotate(45deg) scale(.92); }
      48% { transform: rotate(45deg) scale(1.08); }
    }

    @keyframes shine {
      to { background-position: 230% center; }
    }

    @keyframes btn {
      0%, 100% { background-position: 0% center; transform: translateY(0); }
      50% { background-position: 100% center; transform: translateY(-2px); }
    }

    @keyframes auraPulse {
      0%, 100% { transform: scale(.94); opacity: .68; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    @keyframes ringSpin {
      from { transform: translate(-50%, -50%) rotateX(66deg) rotateZ(0deg); }
      to { transform: translate(-50%, -50%) rotateX(66deg) rotateZ(360deg); }
    }

    @keyframes floatSpin {
      0%, 100% {
        transform: translateY(0) rotateY(0deg) rotateX(0deg) scale(1);
      }
      50% {
        transform: translateY(-16px) rotateY(180deg) rotateX(8deg) scale(1.06);
      }
    }

    @media (max-width: 560px) {
      .heart-stage {
        top: 32%;
        width: min(68vw, 250px);
        height: min(68vw, 250px);
      }

      .letter {
        min-height: 43vh;
      }

      .poem {
        text-align: left;
      }
    }

    @media (max-height: 680px) {
      .heart-stage {
        top: 27%;
        width: min(48vw, 190px);
        height: min(48vw, 190px);
      }

      .letter {
        min-height: 48vh;
        padding-top: 20px;
        padding-bottom: 20px;
      }

      .main-title {
        margin-bottom: 10px;
      }

      .poem {
        min-height: 130px;
        line-height: 1.45;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .card::before,
      .seal::before,
      .seal::after,
      .heart-icon,
      .open-title,
      .main-title,
      .open-btn,
      .heart-aura,
      .heart-ring,
      .big-heart-box {
        animation: none;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="scene scene-one" id="sceneOne">
      <div class="card">
        <div class="card-inner">
          <div class="seal">
            <div class="heart-icon"></div>
          </div>
          <p class="label">A LETTER FOR YOU</p>
          <h1 class="open-title">给懒羊羊</h1>
          <p class="open-text">
            我做了一个小小的宇宙。<br />
            点开以后，里面只写给你。
          </p>
          <button class="open-btn" id="openBtn">点开这封信</button>
          <div class="tip">手机竖屏打开，效果最好</div>
        </div>
      </div>
    </section>

    <section class="scene scene-two" id="sceneTwo">
      <canvas id="canvas"></canvas>

      <div class="heart-stage">
        <div class="heart-aura"></div>
        <div class="heart-ring r1"></div>
        <div class="heart-ring r2"></div>
        <div class="heart-ring r3"></div>
        <div class="big-heart-box">
          <div class="big-heart">
            <div class="heart-shine"></div>
          </div>
        </div>
      </div>

      <div class="letter-wrap">
        <div class="letter">
          <h2 class="main-title">懒羊羊</h2>
          <div class="poem" id="poem"></div>
          <div class="signature" id="signature">From the one who wants to walk beside you.</div>
        </div>
      </div>

      <div class="tap-hint" id="tapHint">轻点屏幕，会有星光回应你</div>
    </section>
  </main>

  <script>
    /*
      自定义区：
      TYPE_SPEED 越小，字出现越快。
      MAX_DPR 越低越流畅，手机建议 1.25；很卡就改成 1。
    */
    const CONFIG = {
      TYPE_SPEED: 22,
      MAX_DPR: 1.25,
      poemLines: [
        "往后长路，",
        "我想和你各自挺拔，彼此支撑。",
        "独立又亲密，",
        "自由且笃定。",
        "风来同挡，晴日共赏，",
        "余生相守。"
      ]
    };

    const sceneOne = document.getElementById("sceneOne");
    const sceneTwo = document.getElementById("sceneTwo");
    const openBtn = document.getElementById("openBtn");
    const poem = document.getElementById("poem");
    const signature = document.getElementById("signature");
    const tapHint = document.getElementById("tapHint");

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { alpha: true });

    let opened = false;
    let w = 0;
    let h = 0;
    let dpr = 1;

    let stars = [];
    let sparks = [];
    let pointer = { x: -9999, y: -9999, active: false };

    function isMobile() {
      return Math.min(window.innerWidth, window.innerHeight) < 720;
    }

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, CONFIG.MAX_DPR);
      w = window.innerWidth;
      h = window.innerHeight;

      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      makeStars();
    }

    function makeStars() {
      stars = [];
      const count = isMobile() ? 95 : 150;

      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * w,
          y: Math.random() * h,
          r: Math.random() * 1.35 + 0.35,
          a: Math.random() * 0.55 + 0.25,
          s: Math.random() * 0.32 + 0.12,
          p: Math.random() * Math.PI * 2
        });
      }
    }

    function startPoem() {
      const text = CONFIG.poemLines.join("\n");
      let i = 0;

      function type() {
        poem.textContent = text.slice(0, i);
        i++;
        if (i <= text.length) {
          setTimeout(type, CONFIG.TYPE_SPEED);
        }
      }

      type();

      setTimeout(() => {
        signature.classList.add("show");
        tapHint.classList.add("show");
      }, 3600);
    }

    function openScene() {
      if (opened) return;
      opened = true;

      sceneOne.classList.add("hide");
      sceneTwo.classList.add("show");

      resize();
      burst(w * 0.5, h * 0.34, isMobile() ? 44 : 62);

      setTimeout(startPoem, 450);
      requestAnimationFrame(draw);
    }

    openBtn.addEventListener("click", openScene);
    openBtn.addEventListener("touchstart", function (e) {
      e.preventDefault();
      openScene();
    }, { passive: false });

    sceneOne.addEventListener("click", openScene);

    function burst(x, y, count) {
      for (let i = 0; i < count; i++) {
        const ang = Math.random() * Math.PI * 2;
        const speed = 1.2 + Math.random() * 3.8;
        sparks.push({
          x,
          y,
          vx: Math.cos(ang) * speed,
          vy: Math.sin(ang) * speed,
          life: 1,
          decay: 0.018 + Math.random() * 0.014,
          r: 1.1 + Math.random() * 2.5,
          hue: Math.random() > 0.35 ? 325 + Math.random() * 36 : 250 + Math.random() * 40
        });
      }
    }

    function updatePointer(e) {
      const p = e.touches ? e.touches[0] : e;
      if (!p) return;
      pointer.x = p.clientX;
      pointer.y = p.clientY;
      pointer.active = true;
    }

    function clearPointer() {
      pointer.active = false;
      pointer.x = -9999;
      pointer.y = -9999;
    }

    sceneTwo.addEventListener("click", e => burst(e.clientX, e.clientY, isMobile() ? 36 : 52));
    sceneTwo.addEventListener("touchstart", e => {
      const t = e.touches[0];
      if (t) burst(t.clientX, t.clientY, isMobile() ? 36 : 52);
    }, { passive: true });

    document.addEventListener("mousemove", updatePointer, { passive: true });
    document.addEventListener("touchmove", updatePointer, { passive: true });
    document.addEventListener("mouseleave", clearPointer);
    document.addEventListener("touchend", clearPointer);

    window.addEventListener("resize", () => {
      if (opened) resize();
    });

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden && opened) requestAnimationFrame(draw);
    });

    function draw(time) {
      if (document.hidden || !opened) return;

      ctx.clearRect(0, 0, w, h);

      const cx = w / 2;
      const cy = h / 2;

      const bg = ctx.createRadialGradient(cx, cy, 20, cx, cy, Math.max(w, h) * 0.72);
      bg.addColorStop(0, "rgba(255,79,163,0.11)");
      bg.addColorStop(0.42, "rgba(140,99,255,0.08)");
      bg.addColorStop(1, "rgba(5,1,10,0.72)");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);

      drawStars(time);
      drawRings(time);
      drawSparks();

      requestAnimationFrame(draw);
    }

    function drawStars(time) {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";

      for (const s of stars) {
        s.y += s.s * 0.12;
        if (s.y > h + 4) {
          s.y = -4;
          s.x = Math.random() * w;
        }

        const alpha = s.a + Math.sin(time * 0.002 + s.p) * 0.18;
        ctx.fillStyle = `rgba(255,235,247,${alpha})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function drawRings(time) {
      const cx = w / 2;
      const cy = h * 0.34;

      ctx.save();
      ctx.globalCompositeOperation = "lighter";

      for (let i = 0; i < 4; i++) {
        const radius = Math.min(w, h) * (0.16 + i * 0.06);
        const rot = time * (0.00032 + i * 0.00005);
        ctx.strokeStyle = i % 2 === 0
          ? `rgba(255,140,205,${0.14 - i * 0.018})`
          : `rgba(150,115,255,${0.13 - i * 0.016})`;
        ctx.lineWidth = i === 0 ? 1.4 : 1;
        ctx.beginPath();
        ctx.ellipse(cx, cy, radius * 1.35, radius * 0.42, rot, 0, Math.PI * 2);
        ctx.stroke();

        const dotAngle = rot * 2 + i;
        const dx = Math.cos(dotAngle) * radius * 1.35;
        const dy = Math.sin(dotAngle) * radius * 0.42;
        ctx.fillStyle = "rgba(255,220,240,.82)";
        ctx.beginPath();
        ctx.arc(cx + dx, cy + dy, 2.0, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function drawSparks() {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";

      for (let i = sparks.length - 1; i >= 0; i--) {
        const p = sparks[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.018;
        p.life -= p.decay;

        if (p.life <= 0) {
          sparks.splice(i, 1);
          continue;
        }

        ctx.fillStyle = `hsla(${p.hue},100%,70%,${p.life})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }
  </script>
</body>
</html>
