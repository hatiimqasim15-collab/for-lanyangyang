<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#07010f" />
  <title>给懒羊羊的一封信</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05010d;
      color: #fff;
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      touch-action: manipulation;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 18%, rgba(132, 86, 255, .25), transparent 34%),
        radial-gradient(circle at 82% 76%, rgba(255, 72, 160, .26), transparent 36%),
        radial-gradient(circle at 50% 42%, rgba(255, 220, 242, .10), transparent 36%),
        linear-gradient(180deg, #07010f 0%, #12031d 48%, #030009 100%);
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .scene {
      position: absolute;
      inset: 0;
      transition: opacity .85s ease, transform .85s ease, filter .85s ease;
    }

    .scene-one {
      z-index: 8;
      display: grid;
      place-items: center;
      padding: 22px;
    }

    .scene-one.hide {
      opacity: 0;
      transform: scale(1.06);
      filter: blur(10px);
      pointer-events: none;
    }

    .scene-two {
      z-index: 3;
      opacity: 0;
      transform: scale(.98);
      pointer-events: none;
    }

    .scene-two.show {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .open-card {
      position: relative;
      width: min(90vw, 520px);
      padding: clamp(30px, 7vw, 44px) clamp(22px, 6vw, 36px);
      border-radius: 32px;
      text-align: center;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.05)),
        radial-gradient(circle at 50% 0%, rgba(255, 89, 171, .25), transparent 62%);
      border: 1px solid rgba(255,255,255,.20);
      box-shadow:
        0 26px 80px rgba(0,0,0,.50),
        0 0 56px rgba(255, 82, 165, .20);
      backdrop-filter: blur(8px);
    }

    .open-card::before {
      content: "";
      position: absolute;
      inset: -45%;
      background: conic-gradient(from 0deg, transparent, rgba(255,255,255,.20), transparent, rgba(255,72,160,.20), transparent);
      animation: turn 8s linear infinite;
      opacity: .82;
    }

    .open-inner {
      position: relative;
      z-index: 1;
    }

    .seal {
      position: relative;
      width: clamp(96px, 27vw, 124px);
      height: clamp(96px, 27vw, 124px);
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background:
        radial-gradient(circle, #fff 0%, #ffd7ea 34%, rgba(255,72,160,.35) 62%, transparent 74%);
      box-shadow:
        0 0 34px rgba(255,255,255,.42),
        0 0 64px rgba(255,72,160,.42);
    }

    .seal::before,
    .seal::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255, 218, 236, .52);
    }

    .seal::before {
      inset: -10px;
      animation: turn 7s linear infinite;
    }

    .seal::after {
      inset: -22px;
      border-style: dashed;
      opacity: .68;
      animation: turn 11s linear infinite reverse;
    }

    .mini-heart {
      position: relative;
      width: clamp(39px, 11vw, 53px);
      height: clamp(39px, 11vw, 53px);
      background: #ff4fa3;
      transform: rotate(45deg);
      animation: beat 1.25s ease-in-out infinite;
      box-shadow:
        0 0 20px rgba(255,79,163,.82),
        0 0 34px rgba(255,79,163,.40);
    }

    .mini-heart::before,
    .mini-heart::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: inherit;
      border-radius: 50%;
      box-shadow: inherit;
    }

    .mini-heart::before {
      left: -50%;
      top: 0;
    }

    .mini-heart::after {
      left: 0;
      top: -50%;
    }

    .label {
      margin: 0 0 12px;
      font-size: 13px;
      letter-spacing: .22em;
      color: rgba(255,236,246,.78);
    }

    .open-title,
    .main-title {
      margin: 0;
      font-weight: 900;
      letter-spacing: .08em;
      line-height: 1.08;
      color: transparent;
      background: linear-gradient(90deg, #ffffff, #ffd6ea, #ff5da9, #ffffff);
      background-size: 230% auto;
      -webkit-background-clip: text;
      background-clip: text;
      animation: shine 3.4s linear infinite;
    }

    .open-title {
      font-size: clamp(34px, 10vw, 62px);
    }

    .open-text {
      margin: 20px auto 0;
      line-height: 1.75;
      font-size: clamp(15px, 4vw, 20px);
      color: rgba(255,238,247,.92);
    }

    .open-btn {
      position: relative;
      margin-top: 28px;
      min-width: 172px;
      padding: 15px 28px;
      border: 0;
      border-radius: 999px;
      color: #fff;
      font-weight: 700;
      font-size: clamp(15px, 4vw, 17px);
      letter-spacing: .08em;
      background: linear-gradient(135deg, #ff4fa3, #8c63ff, #ff86c2);
      background-size: 220% auto;
      box-shadow:
        0 12px 30px rgba(255,79,163,.35),
        0 0 28px rgba(255,255,255,.14);
      cursor: pointer;
      animation: btn 2.4s ease-in-out infinite;
    }

    .tip {
      margin-top: 15px;
      font-size: 13px;
      color: rgba(255,255,255,.56);
    }

    .letter-wrap {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 18px 18px max(48px, env(safe-area-inset-bottom));
      pointer-events: none;
    }

    .letter {
      width: min(92vw, 760px);
      min-height: min(36vh, 292px);
      padding: clamp(21px, 5.5vw, 36px) clamp(22px, 6vw, 48px);
      border-radius: clamp(24px, 7vw, 34px);
      text-align: center;
      background: rgba(10, 5, 22, .48);
      border: 1px solid rgba(255,255,255,.15);
      box-shadow:
        0 22px 70px rgba(0,0,0,.36),
        0 0 50px rgba(255,79,163,.12);
      backdrop-filter: blur(3px);
    }

    .main-title {
      font-size: clamp(31px, 8.8vw, 64px);
      margin-bottom: 11px;
    }

    .poem {
      min-height: 138px;
      margin: 0 auto;
      max-width: 680px;
      white-space: pre-wrap;
      font-size: clamp(18px, 4.75vw, 30px);
      line-height: 1.56;
      font-weight: 600;
      color: #fff1f7;
      text-shadow:
        0 0 13px rgba(255,79,163,.72),
        0 0 28px rgba(255,79,163,.22);
    }

    .signature {
      margin-top: 14px;
      font-size: clamp(12px, 3vw, 17px);
      letter-spacing: .08em;
      color: rgba(255,221,237,.74);
      opacity: 0;
      transform: translateY(10px);
      transition: .7s ease;
    }

    .signature.show {
      opacity: 1;
      transform: translateY(0);
    }

    .tap-hint {
      position: absolute;
      left: 50%;
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 7;
      transform: translateX(-50%);
      width: max-content;
      max-width: 86vw;
      text-align: center;
      font-size: 13px;
      letter-spacing: .06em;
      color: rgba(255,255,255,.58);
      opacity: 0;
      transition: .7s ease 1.2s;
      pointer-events: none;
    }

    .tap-hint.show {
      opacity: 1;
    }

    @keyframes turn {
      to { transform: rotate(360deg); }
    }

    @keyframes beat {
      0%, 100% { transform: rotate(45deg) scale(.92); }
      48% { transform: rotate(45deg) scale(1.08); }
    }

    @keyframes shine {
      to { background-position: 230% center; }
    }

    @keyframes btn {
      0%, 100% { background-position: 0% center; transform: translateY(0); }
      50% { background-position: 100% center; transform: translateY(-2px); }
    }

    @media (max-width: 560px) {
      .poem {
        text-align: left;
      }
    }

    @media (max-height: 680px) {
      .letter {
        min-height: 39vh;
        padding-top: 17px;
        padding-bottom: 17px;
      }

      .main-title {
        margin-bottom: 8px;
      }

      .poem {
        min-height: 118px;
        line-height: 1.43;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="scene scene-one" id="sceneOne">
      <div class="open-card">
        <div class="open-inner">
          <div class="seal">
            <div class="mini-heart"></div>
          </div>
          <p class="label">A LETTER FOR YOU</p>
          <h1 class="open-title">给懒羊羊</h1>
          <p class="open-text">
            我做了一个小小的宇宙。<br />
            点开以后，有一颗心只为你旋转。
          </p>
          <button class="open-btn" id="openBtn">点开这封信</button>
          <div class="tip">手机竖屏打开，效果最好</div>
        </div>
      </div>
    </section>

    <section class="scene scene-two" id="sceneTwo">
      <canvas id="canvas"></canvas>

      <div class="letter-wrap">
        <div class="letter">
          <h2 class="main-title">懒羊羊</h2>
          <div class="poem" id="poem"></div>
          <div class="signature" id="signature">From the one who wants to walk beside you.</div>
        </div>
      </div>

      <div class="tap-hint" id="tapHint">轻点屏幕，会有星光回应你</div>
    </section>
  </main>

  <script>
    /*
      自定义区：
      TYPE_SPEED 越小，字出现越快。
      MAX_DPR 越低越流畅，手机建议 1.2；很卡就改成 1。
      HEART_POINTS 是 3D 心的点数，手机建议 520-760。
    */
    const CONFIG = {
      TYPE_SPEED: 22,
      MAX_DPR: 1.2,
      HEART_POINTS: 640,
      poemLines: [
        "往后长路，",
        "我想和你各自挺拔，彼此支撑。",
        "独立又亲密，",
        "自由且笃定。",
        "风来同挡，晴日共赏，",
        "余生相守。"
      ]
    };

    const sceneOne = document.getElementById("sceneOne");
    const sceneTwo = document.getElementById("sceneTwo");
    const openBtn = document.getElementById("openBtn");
    const poem = document.getElementById("poem");
    const signature = document.getElementById("signature");
    const tapHint = document.getElementById("tapHint");

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { alpha: true });

    let opened = false;
    let w = 0;
    let h = 0;
    let dpr = 1;

    let stars = [];
    let heart = [];
    let rings = [];
    let sparks = [];

    let pointer = { x: -9999, y: -9999, active: false };

    function isMobile() {
      return Math.min(window.innerWidth, window.innerHeight) < 720;
    }

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, CONFIG.MAX_DPR);
      w = window.innerWidth;
      h = window.innerHeight;

      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      makeStars();
      makeHeart();
      makeRings();
    }

    function heart2D(t, scale) {
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = -(
        13 * Math.cos(t) -
        5 * Math.cos(2 * t) -
        2 * Math.cos(3 * t) -
        Math.cos(4 * t)
      );
      return { x: x * scale, y: y * scale };
    }

    function heartCenter() {
      return {
        x: w / 2,
        y: h * (isMobile() ? 0.30 : 0.34),
        scale: Math.min(w, h) / (isMobile() ? 42 : 39)
      };
    }

    function makeStars() {
      stars = [];
      const count = isMobile() ? 95 : 150;

      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * w,
          y: Math.random() * h,
          r: Math.random() * 1.3 + 0.35,
          a: Math.random() * 0.55 + 0.22,
          p: Math.random() * Math.PI * 2,
          vy: Math.random() * 0.12 + 0.04
        });
      }
    }

    function makeHeart() {
      heart = [];

      const c = heartCenter();
      const count = isMobile() ? Math.min(CONFIG.HEART_POINTS, 640) : Math.max(CONFIG.HEART_POINTS, 860);

      for (let i = 0; i < count; i++) {
        const t = Math.random() * Math.PI * 2;

        /*
          这里不是一条线，而是很多层不同大小的心叠在一起。
          z 轴厚度越靠中心越厚，所以旋转时有明显 3D 体积感。
        */
        const layer = Math.pow(Math.random(), 0.45);
        const scale = c.scale * (0.34 + layer * 0.72);
        const p = heart2D(t, scale);

        const thickness = c.scale * 7.0 * (1 - layer * 0.60);
        const z = (Math.random() - 0.5) * thickness;

        heart.push({
          x: p.x,
          y: p.y,
          z,
          baseSize: 1.0 + Math.random() * 2.1,
          hue: Math.random() > 0.25 ? 330 + Math.random() * 28 : 258 + Math.random() * 24,
          alpha: 0.44 + Math.random() * 0.56,
          phase: Math.random() * Math.PI * 2
        });
      }
    }

    function makeRings() {
      rings = [];

      for (let i = 0; i < 5; i++) {
        rings.push({
          radius: Math.min(w, h) * (0.18 + i * 0.052),
          tilt: 0.58 + i * 0.08,
          speed: 0.00032 + i * 0.00006,
          phase: Math.random() * Math.PI * 2,
          alpha: 0.13 - i * 0.012
        });
      }
    }

    function startPoem() {
      const text = CONFIG.poemLines.join("\n");
      let i = 0;

      function type() {
        poem.textContent = text.slice(0, i);
        i++;

        if (i <= text.length) {
          setTimeout(type, CONFIG.TYPE_SPEED);
        }
      }

      type();

      setTimeout(() => {
        signature.classList.add("show");
        tapHint.classList.add("show");
      }, 3600);
    }

    function openScene() {
      if (opened) return;
      opened = true;

      sceneOne.classList.add("hide");
      sceneTwo.classList.add("show");

      resize();

      const c = heartCenter();
      burst(c.x, c.y, isMobile() ? 58 : 84);

      setTimeout(startPoem, 450);
      requestAnimationFrame(draw);
    }

    openBtn.addEventListener("click", openScene);
    openBtn.addEventListener("touchstart", function (e) {
      e.preventDefault();
      openScene();
    }, { passive: false });

    sceneOne.addEventListener("click", openScene);

    function burst(x, y, count) {
      for (let i = 0; i < count; i++) {
        const ang = Math.random() * Math.PI * 2;
        const speed = 1.4 + Math.random() * 4.4;

        sparks.push({
          x,
          y,
          vx: Math.cos(ang) * speed,
          vy: Math.sin(ang) * speed,
          life: 1,
          decay: 0.016 + Math.random() * 0.014,
          r: 1.0 + Math.random() * 2.8,
          hue: Math.random() > 0.4 ? 330 + Math.random() * 36 : 255 + Math.random() * 38
        });
      }
    }

    sceneTwo.addEventListener("click", e => burst(e.clientX, e.clientY, isMobile() ? 38 : 58));

    sceneTwo.addEventListener("touchstart", e => {
      const t = e.touches[0];
      if (t) burst(t.clientX, t.clientY, isMobile() ? 38 : 58);
    }, { passive: true });

    function updatePointer(e) {
      const p = e.touches ? e.touches[0] : e;
      if (!p) return;
      pointer.x = p.clientX;
      pointer.y = p.clientY;
      pointer.active = true;
    }

    function clearPointer() {
      pointer.active = false;
      pointer.x = -9999;
      pointer.y = -9999;
    }

    document.addEventListener("mousemove", updatePointer, { passive: true });
    document.addEventListener("touchmove", updatePointer, { passive: true });
    document.addEventListener("mouseleave", clearPointer);
    document.addEventListener("touchend", clearPointer);

    window.addEventListener("resize", () => {
      if (opened) resize();
    });

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden && opened) requestAnimationFrame(draw);
    });

    function rotate3D(p, ax, ay, az) {
      let x = p.x;
      let y = p.y;
      let z = p.z;

      let cy = Math.cos(ay), sy = Math.sin(ay);
      let x1 = x * cy + z * sy;
      let z1 = -x * sy + z * cy;

      let cx = Math.cos(ax), sx = Math.sin(ax);
      let y2 = y * cx - z1 * sx;
      let z2 = y * sx + z1 * cx;

      let cz = Math.cos(az), sz = Math.sin(az);
      let x3 = x1 * cz - y2 * sz;
      let y3 = x1 * sz + y2 * cz;

      return { x: x3, y: y3, z: z2 };
    }

    function draw(time) {
      if (document.hidden || !opened) return;

      ctx.clearRect(0, 0, w, h);

      const c = heartCenter();

      drawBackground(c);
      drawStars(time);
      drawRings(time, c);
      draw3DHeart(time, c);
      drawSparks();

      requestAnimationFrame(draw);
    }

    function drawBackground(c) {
      const bg = ctx.createRadialGradient(
        c.x,
        c.y,
        20,
        c.x,
        c.y,
        Math.max(w, h) * 0.72
      );

      bg.addColorStop(0, "rgba(255,79,163,0.16)");
      bg.addColorStop(0.22, "rgba(150,95,255,0.10)");
      bg.addColorStop(0.54, "rgba(20,10,40,0.10)");
      bg.addColorStop(1, "rgba(3,0,9,0.78)");

      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);
    }

    function drawStars(time) {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";

      for (const s of stars) {
        s.y += s.vy;
        if (s.y > h + 5) {
          s.y = -5;
          s.x = Math.random() * w;
        }

        const alpha = s.a + Math.sin(time * 0.002 + s.p) * 0.18;
        ctx.fillStyle = `rgba(255,235,247,${alpha})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function drawRings(time, c) {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";

      for (let i = 0; i < rings.length; i++) {
        const r = rings[i];
        const rot = time * r.speed + r.phase;

        ctx.strokeStyle = i % 2 === 0
          ? `rgba(255, 135, 205, ${r.alpha})`
          : `rgba(158, 125, 255, ${r.alpha})`;

        ctx.lineWidth = i === 0 ? 1.45 : 1;
        ctx.beginPath();
        ctx.ellipse(
          c.x,
          c.y,
          r.radius * 1.22,
          r.radius * 0.35,
          rot,
          0,
          Math.PI * 2
        );
        ctx.stroke();

        const dotX = c.x + Math.cos(rot * 2.2 + i) * r.radius * 1.22;
        const dotY = c.y + Math.sin(rot * 2.2 + i) * r.radius * 0.35;

        ctx.fillStyle = "rgba(255,235,247,.82)";
        ctx.beginPath();
        ctx.arc(dotX, dotY, 2.0, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function draw3DHeart(time, c) {
      const ax = Math.sin(time * 0.0011) * 0.18;
      const ay = time * 0.00115;
      const az = Math.sin(time * 0.0008) * 0.10;
      const pulse = 1 + Math.sin(time * 0.0032) * 0.045;
      const perspective = Math.min(w, h) * 2.35;

      const projected = [];

      for (const p of heart) {
        const r = rotate3D(p, ax, ay, az);
        const z = r.z + c.scale * 9.0;
        const depth = perspective / (perspective + z);

        let x = c.x + r.x * pulse * depth;
        let y = c.y + r.y * pulse * depth;

        if (pointer.active) {
          const dx = x - pointer.x;
          const dy = y - pointer.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist > 0 && dist < 95) {
            const force = (95 - dist) / 95;
            x += (dx / dist) * force * 15;
            y += (dy / dist) * force * 15;
          }
        }

        projected.push({
          x,
          y,
          z: r.z,
          size: p.baseSize * depth * (1.0 + Math.sin(time * 0.004 + p.phase) * 0.13),
          alpha: p.alpha * (0.48 + depth * 0.58),
          hue: p.hue,
          front: r.z > 0
        });
      }

      projected.sort((a, b) => a.z - b.z);

      ctx.save();
      ctx.globalCompositeOperation = "lighter";

      const glow = ctx.createRadialGradient(c.x, c.y, 1, c.x, c.y, c.scale * 9.4);
      glow.addColorStop(0, "rgba(255,85,170,0.28)");
      glow.addColorStop(0.38, "rgba(255,85,170,0.12)");
      glow.addColorStop(1, "rgba(255,85,170,0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(c.x, c.y, c.scale * 9.4, 0, Math.PI * 2);
      ctx.fill();

      for (const p of projected) {
        const light = p.front ? 72 : 55;
        ctx.fillStyle = `hsla(${p.hue}, 100%, ${light}%, ${p.alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(0.55, p.size), 0, Math.PI * 2);
        ctx.fill();
      }

      /*
        额外高光，让它更像立体水晶心。
      */
      ctx.fillStyle = "rgba(255,255,255,.78)";
      ctx.beginPath();
      ctx.arc(c.x - c.scale * 2.1, c.y - c.scale * 4.0, c.scale * 0.42, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,.38)";
      ctx.beginPath();
      ctx.arc(c.x - c.scale * 1.25, c.y - c.scale * 3.20, c.scale * 0.20, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawSparks() {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";

      for (let i = sparks.length - 1; i >= 0; i--) {
        const p = sparks[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.018;
        p.life -= p.decay;

        if (p.life <= 0) {
          sparks.splice(i, 1);
          continue;
        }

        ctx.fillStyle = `hsla(${p.hue}, 100%, 70%, ${p.life})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }
  </script>
</body>
</html>
